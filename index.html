<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Anshori | Digital Entrepreneur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* Warna gelap elegan */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding-top: 50px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }
        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #0ea5e9;
            transform: scale(1.05);
        }
        footer {
            margin-top: auto;
            padding: 40px 20px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="foto-saya.jpg" alt="Al Anshori" class="profile-img">
        
        <h1>AL ANSHORI</h1>
        <p class="subtitle">Web Developer & Digital Entrepreneur</p>
        
        <p>Welcome to my professional portfolio. I build modern websites and digital solutions for international clients.</p>
        
        <a href="https://wa.me/your-number-here" class="btn">Contact Me</a>
    </div>

    <footer>
        <p>© 2026 Crafted with ❤️ by <strong>AL ANSHORI</strong></p>
    </footer>

</body>
</html>
