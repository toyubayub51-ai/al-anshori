
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRO - The Final Destination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="star-field"></div>
    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full overflow-hidden border border-indigo-500">
                <img src="al-anshori.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <span class="font-bold text-xl tracking-widest uppercase">ASTRO</span>
        </div>
        <button class="text-2xl"><i class="fas fa-bars"></i></button>
    </nav>
    <section class="px-6 py-12 text-center">
        <div class="relative inline-block mb-8">
            <div class="w-40 h-40 border-2 border-dashed border-indigo-500 rounded-full flex items-center justify-center animate-spin-slow">
                <div class="w-28 h-28 bg-indigo-600 rounded-full flex items-center justify-center overflow-hidden border-4 border-black">
                    <img src="al-anshori.jpg" alt="Al Anshori" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
        <div class="inline-flex items-center gap-2 bg-black/50 border border-indigo-500/30 px-4 py-1 rounded-full text-[10px] text-indigo-300 mb-6">
            <span class="w-2 h-2 bg-green-500 rounded-full"></span> LIVE ON SOLANA
        </div>
        <h1 class="text-5xl font-black mb-4 leading-tight uppercase">ASTRO:<br>The Final Destination.</h1>
        <p class="text-gray-400 text-sm max-w-xs mx-auto mb-10">When everyone says "I'm out", we're just launching to the moon.</p>
        <div class="flex flex-col gap-4 px-4 mb-16">
            <button class="bg-indigo-600 py-4 rounded-xl font-bold uppercase tracking-wider">Buy on Raydium</button>
            <button class="bg-gray-800/50 py-4 rounded-xl font-bold border border-white/10 uppercase tracking-wider">View Chart</button>
        </div>
    </section>
    <footer class="text-center py-10 border-t border-white/5">
        <p class="text-[10px] text-gray-600 tracking-[0.2em] uppercase mb-2">&copy; 2026 ASTRO Token Project</p>
        <p class="text-sm font-semibold text-indigo-500 uppercase tracking-widest">by al anshori</p>
    </footer>
</body>
</html>
